server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 도커 임베디드 DNS. valid=10s로 짧게 둬서 apigateway 재기동 시 10초 내 최신 IP로 자동 갱신
    # (resolver 없이 proxy_pass에 리터럴 호스트네임을 쓰면 워커 시작 시점 IP를 워커 수명 내내
    # 캐싱해 컨테이너 재기동 후 502가 나던 문제 — 2026-07-08 인시던트).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # 해시된 정적 에셋: 없으면 404 (index.html 폴백 금지 → MIME 오류 방지)
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # k3s OIDC issuer discovery/JWKS — 콘텐츠는 k8s ConfigMap 마운트(BE 리포 관할).
    # default_type: 확장자 없는 파일이 application/octet-stream으로 나가는 것 교정
    # (STS의 content-type 요구 여부 미확정 → 리스크 제거).
    # =404: SPA 폴백이 파일 부재를 index.html 200으로 은폐하는 것 차단(실패는 시끄럽게).
    # prefix 블록(^~)인 이유: 정확 매치(=)만 두면 인접 경로(/.well-known/no-such)가
    # SPA 폴백으로 흘러 200을 반환 — 파일 부재를 은폐한다. .well-known 밑에 SPA 라우트는
    # 없고, ACME HTTP-01 챌린지는 인그레스 솔버가 선점하므로 이 nginx엔 도달하지 않는다.
    location ^~ /.well-known/ {
        default_type application/json;
        try_files $uri =404;
    }

    location ^~ /openid/ {
        default_type application/json;
        try_files $uri =404;
    }

    # 백엔드 프록시 (application-compose.yaml 라우트 프리픽스와 일치)
    # 같은 compose 네트워크의 apigateway 서비스명으로 해석된다.
    location ~ ^/(api|auth|v3/api-docs)(/|$) {
        # 변수를 거쳐야 위 resolver가 적용됨(리터럴 호스트네임은 resolver 무시하고 1회만 resolve).
        set $apigateway_upstream apigateway:8000;
        proxy_pass http://$apigateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA 라우팅: 그 외 경로는 index.html (TanStack Router 클라 라우팅)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
